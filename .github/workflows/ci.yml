name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
          bb: latest

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: m2-${{ runner.os }}-${{ hashFiles('deps.edn', 'bb.edn') }}
          restore-keys: |
            m2-${{ runner.os }}-

      - name: Check formatting
        run: clojure -M:fmt check src test scripts

      - name: Run tests
        run: bb test
